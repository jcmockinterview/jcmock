{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block head %}
<style>
.auth-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.auth-wrap::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
  top: -200px; right: -200px;
  pointer-events: none;
}
.auth-wrap::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, transparent 70%);
  bottom: -100px; left: -100px;
  pointer-events: none;
}
.auth-card {
  width: 100%;
  max-width: 440px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 2.5rem 2.8rem;
  position: relative;
  z-index: 1;
}
.auth-logo {
  font-family: var(--font-head);
  font-size: 1.6rem;
  font-weight: 800;
  text-decoration: none;
  color: var(--text);
  display: block;
  margin-bottom: 2rem;
  text-align: center;
}
.auth-logo span { color: var(--accent); }
.auth-title {
  font-family: var(--font-head);
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 0.4rem;
}
.auth-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; }
.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.auth-switch { text-align: center; font-size: 0.85rem; color: var(--muted); margin-top: 1.2rem; }
.auth-switch a { color: var(--accent); text-decoration: none; font-weight: 500; }
.auth-switch a:hover { text-decoration: underline; }
.input-wrap { position: relative; }
.input-wrap svg {
  position: absolute; left: 0.9rem; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--muted2); pointer-events: none;
}
.input-wrap input { padding-left: 2.5rem !important; }
.password-wrap { position: relative; }
.toggle-pwd {
  position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted2); cursor: pointer; padding: 0; display: flex;
}
.toggle-pwd svg { width: 17px; height: 17px; }
.forgot-link { display: block; text-align: right; font-size: 0.8rem; color: var(--muted); text-decoration: none; margin-top: 0.3rem; }
.forgot-link:hover { color: var(--accent); }
</style>
{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <a href="/" class="auth-logo">Job<span>Cooked</span> 🍳</a>

    <h2 class="auth-title">Welcome back 👋</h2>
    <p class="auth-sub">Sign in to continue your interview prep journey.</p>

    <div class="msg" id="msg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap password-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="toggle-pwd" onclick="togglePwd('password', this)" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <a href="/forgot-password" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-primary" id="btn-login" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </button>

    <hr class="divider"/>
    <p class="auth-switch">Don't have an account? <a href="/register">Create one free</a></p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  const btn = inp.parentElement.querySelector('.toggle-pwd');
  if (!btn) return;
  btn.innerHTML = inp.type === 'text'
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  const msg   = document.getElementById('msg');
  const btn   = document.getElementById('btn-login');

  msg.className = 'msg';

  if (!email || !pwd) {
    msg.textContent = 'Please enter your email and password.';
    msg.className   = 'msg error';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Signing in…';

  try {
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd })
    });
    const data = await res.json();

    if (data.ok) {
      msg.textContent = 'Login successful! Redirecting…';
      msg.className   = 'msg success';
      setTimeout(() => window.location.href = data.redirect, 800);
    } else {
      msg.textContent = data.msg;
      msg.className   = 'msg error';
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  } catch (e) {
    msg.textContent = 'Network error. Please try again.';
    msg.className   = 'msg error';
    btn.disabled    = false;
    btn.textContent = 'Sign In';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
{% endblock %}
